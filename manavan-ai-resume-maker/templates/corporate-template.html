<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.4;
            color: #000;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: left;
            margin-bottom: 20px;
            border-bottom: 3px solid #000;
            padding-bottom: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
        }

        .contact {
            font-size: 12px;
        }

        .section {
            margin-top: 15px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #000;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .item {
            margin-bottom: 10px;
        }

        .item-header {
            font-weight: bold;
        }

        .summary {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="header" style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h1>{{name}}</h1>
            <div class="contact">{{email}} | {{phone}} | {{linkedin}}</div>
        </div>
        {{photo_html}}
    </div>

    <div class="summary">{{summary}}</div>

    <div class="section">
        <div class="section-title">Skills</div>
        <div>{{skills}}</div>
    </div>

    <div class="section">
        <div class="section-title">Experience</div>
        {{experience}}
    </div>

    <div class="section">
        <div class="section-title">Projects</div>
        {{projects}}
    </div>

    <div class="section">
        <div class="section-title">Education</div>
        {{education}}
    </div>
</body>

</html>
