<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: #2c3e50;
            font-size: 32px;
        }

        .contact {
            margin-top: 5px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
            text-transform: uppercase;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .item {
            margin-bottom: 15px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .item-sub {
            color: #555;
            font-style: italic;
            font-size: 14px;
        }

        .bullets {
            margin-left: 20px;
            margin-top: 5px;
            list-style-type: square;
        }

        .summary {
            font-style: italic;
            color: #444;
        }
    </style>
</head>

<body>
    <div class="header" style="display: flex; align-items: center; justify-content: center; gap: 20px;">
        {{photo_html}}
        <div>
            <h1>{{name}}</h1>
            <div class="contact">{{email}} | {{phone}} | {{linkedin}} | {{portfolio}}</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Professional Summary</div>
        <div class="summary">{{summary}}</div>
    </div>

    <div class="section">
        <div class="section-title">Skills</div>
        <div>{{skills}}</div>
    </div>

    <div class="section">
        <div class="section-title">Experience</div>
        {{experience}}
    </div>

    <div class="section">
        <div class="section-title">Projects</div>
        {{projects}}
    </div>

    <div class="section">
        <div class="section-title">Education</div>
        {{education}}
    </div>

    <div class="section">
        <div class="section-title">Achievements</div>
        {{achievements}}
    </div>
</body>

</html>
